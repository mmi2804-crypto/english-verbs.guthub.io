<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Глаголы">

<link rel="manifest" href="./manifest.json">
<title>350 Глаголов</title>
<style>
/* Встроенные шрифты — для работы offline */
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Mulish:wght@400;600&display=swap');

:root {
  --bg: #f5f0e8; --card: #ffffff; --ink: #1a1208; --muted: #8a7f70;
  --accent: #d4500a; --accent2: #2a6b3c; --border: #ddd5c5;
  --correct: #2a6b3c; --wrong: #c0392b;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  background: var(--bg); color: var(--ink);
  font-family: 'Mulish', -apple-system, sans-serif;
  min-height: 100vh;
  padding: calc(16px + var(--safe-top)) 16px calc(32px + var(--safe-bottom));
  display: flex; flex-direction: column; align-items: center;
}
header { text-align: center; margin-bottom: 20px; width: 100%; }
header h1 {
  font-family: 'Unbounded', -apple-system, sans-serif;
  font-size: clamp(1.3rem, 4vw, 2rem); font-weight: 900;
  color: var(--accent); letter-spacing: -1px; line-height: 1.1;
}
header p { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }

.offline-badge {
  display: none; background: var(--accent2); color: white;
  font-size: 0.7rem; font-weight: 600; padding: 3px 10px;
  border-radius: 100px; margin-top: 6px; letter-spacing: 1px;
}
.offline-badge.show { display: inline-block; }

.controls {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center; margin-bottom: 16px; width: 100%; max-width: 600px;
}
.ctrl-btn {
  background: var(--card); border: 2px solid var(--border);
  color: var(--muted); font-family: 'Mulish', sans-serif;
  font-size: 0.8rem; font-weight: 600; padding: 8px 16px;
  cursor: pointer; border-radius: 100px; transition: all 0.2s;
  -webkit-appearance: none;
}
.ctrl-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.sets {
  display: flex; flex-wrap: wrap; gap: 6px;
  justify-content: center; margin-bottom: 20px; width: 100%; max-width: 600px;
}
.set-btn {
  background: var(--card); border: 2px solid var(--border);
  color: var(--muted); font-family: 'Mulish', sans-serif;
  font-size: 0.72rem; font-weight: 600; padding: 5px 12px;
  cursor: pointer; border-radius: 100px; transition: all 0.2s;
  -webkit-appearance: none;
}
.set-btn.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }

.stats {
  display: flex; gap: 24px; margin-bottom: 16px;
  font-family: 'Unbounded', sans-serif; font-size: 0.7rem;
}
.stat { text-align: center; }
.stat-val { font-size: 1.5rem; font-weight: 700; color: var(--accent); line-height: 1; }
.stat-val.green { color: var(--correct); }
.stat-label { color: var(--muted); font-size: 0.6rem; margin-top: 2px; }

.card {
  background: var(--card); border: 2px solid var(--border);
  border-radius: 20px; width: 100%; max-width: 600px;
  padding: 28px 22px; box-shadow: 4px 4px 0 var(--border);
}
.progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }

.q-num { font-size: 0.7rem; color: var(--muted); font-weight: 600; margin-bottom: 10px; letter-spacing: 1px; text-transform: uppercase; }
.q-word {
  font-family: 'Unbounded', -apple-system, sans-serif;
  font-size: clamp(1.7rem, 6vw, 2.6rem); font-weight: 900;
  color: var(--ink); line-height: 1.1;
}
.q-transcription { font-size: 0.95rem; color: var(--accent2); margin: 5px 0 3px; font-style: italic; }
.q-hint { font-size: 0.78rem; color: var(--muted); margin-bottom: 20px; margin-top: 4px; }

.options { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.opt {
  background: var(--bg); border: 2px solid var(--border);
  color: var(--ink); font-family: 'Mulish', sans-serif;
  font-size: 0.9rem; font-weight: 600; padding: 13px 14px;
  text-align: left; cursor: pointer; border-radius: 12px;
  transition: all 0.15s; line-height: 1.3;
  -webkit-appearance: none; touch-action: manipulation;
}
.opt:active:not(:disabled) { transform: scale(0.97); }
.opt.correct { border-color: var(--correct); color: var(--correct); background: #edfaf2; }
.opt.wrong { border-color: var(--wrong); color: var(--wrong); background: #fdf0ee; }
.opt:disabled { cursor: default; }

.explanation {
  border-left: 4px solid var(--accent); padding: 10px 14px;
  background: #fff8f3; font-size: 0.84rem; line-height: 1.6;
  border-radius: 0 8px 8px 0; display: none; margin-top: 14px;
}
.explanation.visible { display: block; }

.next-btn {
  margin-top: 14px; background: var(--accent); color: #fff; border: none;
  font-family: 'Unbounded', sans-serif; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 1px; padding: 16px 0; cursor: pointer;
  border-radius: 100px; transition: opacity 0.2s; display: none;
  -webkit-appearance: none; touch-action: manipulation;
  width: 100%;
}
.next-btn.visible { display: block; }
.speak-btn {
  background: none; border: 2px solid var(--border);
  border-radius: 100px; padding: 7px 16px; cursor: pointer;
  font-size: 1.1rem; color: var(--accent2); margin-left: 10px;
  vertical-align: middle; transition: all 0.2s;
  -webkit-appearance: none; touch-action: manipulation; line-height: 1;
}
.speak-btn:active { background: var(--accent2); color: #fff; border-color: var(--accent2); }

.result { text-align: center; display: none; padding: 12px 0; }
.result.visible { display: block; }
.result h2 { font-family: 'Unbounded', sans-serif; font-size: 1.4rem; color: var(--accent); margin-bottom: 8px; }
.result .big { font-family: 'Unbounded', sans-serif; font-size: 3.2rem; font-weight: 900; color: var(--ink); line-height: 1; margin: 10px 0; }
.result p { color: var(--muted); margin-bottom: 18px; font-size: 0.95rem; }
.result-btn {
  background: var(--accent); color: #fff; border: none;
  font-family: 'Unbounded', sans-serif; font-size: 0.7rem; font-weight: 700;
  padding: 13px 26px; cursor: pointer; border-radius: 100px;
  transition: opacity 0.2s; margin: 4px; -webkit-appearance: none;
}
.result-btn.outline { background: transparent; color: var(--accent); border: 2px solid var(--accent); }

.install-hint {
  margin-top: 20px; padding: 14px 18px;
  background: var(--card); border: 2px dashed var(--border);
  border-radius: 14px; text-align: center;
  font-size: 0.78rem; color: var(--muted); max-width: 600px; width: 100%;
  line-height: 1.6;
}
.install-hint strong { color: var(--accent); }
.install-hint.hidden { display: none; }

@media (max-width: 420px) {
  .options { grid-template-columns: 1fr; }
  .card { padding: 20px 16px; }
}
</style>
</head>
<body>

<header>
  <h1>350 глаголов</h1>
  <p>Тренажёр · Английский → Русский</p>
  <span class="offline-badge" id="offlineBadge">✓ Работает офлайн</span>
</header>

<div class="controls">
  <button class="ctrl-btn active" id="modeEN" onclick="setMode('en')">🇬🇧 → 🇷🇺 Перевод</button>
  <button class="ctrl-btn" id="modeRU" onclick="setMode('ru')">🇷🇺 → 🇬🇧 Написание</button>
</div>

<div class="sets" id="setNav"></div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="statTotal">0</div><div class="stat-label">Всего</div></div>
  <div class="stat"><div class="stat-val green" id="statRight">0</div><div class="stat-label">Верно</div></div>
  <div class="stat"><div class="stat-val" id="statPct">0%</div><div class="stat-label">Точность</div></div>
</div>

<div class="card">
  <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
  <div id="qArea"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQ()">Дальше →</button>
  <div class="explanation" id="expl"></div>
  <div class="result" id="result">
    <h2>Раунд завершён!</h2>
    <div class="big" id="rScore"></div>
    <p id="rMsg"></p>
    <button class="result-btn" onclick="restartSame()">Ещё раз этот набор</button><br>
    <button class="result-btn outline" onclick="restartRandom()" style="margin-top:8px">Случайные 20 слов</button>
  </div>
</div>

<div class="install-hint" id="installHint">
  📱 <strong>Установить как приложение:</strong><br>
  Нажмите <strong>«Поделиться»</strong> → <strong>«На экран Домой»</strong><br>
  Приложение будет работать <strong>без интернета</strong>
</div>

<script>
// Register Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').then(function() {
      document.getElementById('offlineBadge').classList.add('show');
    });
  });
}

// Hide install hint if already installed as PWA
if (window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches) {
  document.getElementById('installHint').classList.add('hidden');
  document.getElementById('offlineBadge').classList.add('show');
}

];

var SETS = [
  {label:"1–50",   from:0,   to:50},
  {label:"51–100", from:50,  to:100},
  {label:"101–150",from:100, to:150},
  {label:"151–200",from:150, to:200},
  {label:"201–250",from:200, to:250},
  {label:"251–300",from:250, to:300},
  {label:"301–350",from:300, to:350},
  {label:"Все 350",from:0,   to:350}
];

var mode = 'en', currentSet = 0, questions = [], qIdx = 0, score = 0, total = 0, answered = false;

var nav = document.getElementById('setNav');
SETS.forEach(function(s, i) {
  var btn = document.createElement('button');
  btn.className = 'set-btn' + (i === 0 ? ' active' : '');
  btn.textContent = s.label;
  btn.addEventListener('click', function() { selectSet(i); });
  nav.appendChild(btn);
});

function setMode(m) {
  mode = m;
  document.getElementById('modeEN').classList.toggle('active', m === 'en');
  document.getElementById('modeRU').classList.toggle('active', m === 'ru');
  function speakWord(word) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();

  function doSpeak() {
    var u = new SpeechSynthesisUtterance(word);
    // Try to find English voice
    var voices = window.speechSynthesis.getVoices();
    var enVoice = voices.find(function(v) { return v.lang.indexOf('en') === 0; });
    if (enVoice) u.voice = enVoice;
    u.lang = 'en-US';
    u.rate = 0.85;
    u.pitch = 1;
    u.volume = 1;
    window.speechSynthesis.speak(u);
  }

  // iOS loads voices asynchronously
  var voices = window.speechSynthesis.getVoices();
  if (voices.length > 0) {
    doSpeak();
  } else {
    window.speechSynthesis.onvoiceschanged = function() {
      window.speechSynthesis.onvoiceschanged = null;
      doSpeak();
    };
    // Fallback if onvoiceschanged never fires
    setTimeout(doSpeak, 200);
  }
}
restart();
}
function selectSet(i) {
  currentSet = i;
  document.querySelectorAll('.set-btn').forEach(function(b, j) { b.classList.toggle('active', j === i); });
  restart();
}
function shuffle(arr) { return arr.slice().sort(function() { return Math.random() - 0.5; }); }
function getPool() { var s = SETS[currentSet]; return ALL.slice(s.from, s.to); }

function restart() {
  var pool = getPool();
  questions = pool.length > 30 ? shuffle(pool).slice(0, 20) : shuffle(pool);
  qIdx = 0; score = 0; total = 0; answered = false;
  document.getElementById('result').classList.remove('visible');
  updateStats(); renderQ();
}
function restartSame() { restart(); }
function restartRandom() {
  currentSet = SETS.length - 1;
  document.querySelectorAll('.set-btn').forEach(function(b, j) { b.classList.toggle('active', j === currentSet); });
  restart();
}
function updateStats() {
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statRight').textContent = score;
  document.getElementById('statPct').textContent = total > 0 ? Math.round(score/total*100) + '%' : '0%';
}
function renderQ() {
  if (qIdx >= questions.length) { showResult(); return; }
  var q = questions[qIdx];
  answered = false;
  document.getElementById('pFill').style.width = (qIdx / questions.length * 100) + '%';
  document.getElementById('expl').classList.remove('visible');
  document.getElementById('expl').innerHTML = '';
  document.getElementById('nextBtn').classList.remove('visible');
  var area = document.getElementById('qArea');
  area.innerHTML = '';

  var numDiv = document.createElement('div');
  numDiv.className = 'q-num';
  numDiv.textContent = 'Вопрос ' + (qIdx+1) + ' из ' + questions.length;
  area.appendChild(numDiv);

  var wordRow = document.createElement('div');
  wordRow.style.display = 'flex';
  wordRow.style.alignItems = 'center';
  wordRow.style.flexWrap = 'wrap';
  wordRow.style.gap = '4px';

  var wordDiv = document.createElement('div');
  wordDiv.className = 'q-word';
  wordDiv.style.display = 'inline';
  wordDiv.textContent = mode === 'en' ? q.e : q.r;
  wordRow.appendChild(wordDiv);

  var speakBtn = document.createElement('button');
  speakBtn.className = 'speak-btn';
  speakBtn.title = 'Прослушать';
  speakBtn.textContent = '🔊';
  var wordToSpeak = q.e;
  speakBtn.addEventListener('click', function() { speakWord(wordToSpeak); });
  wordRow.appendChild(speakBtn);
  area.appendChild(wordRow);

  if (mode === 'en') {
    var td = document.createElement('div');
    td.className = 'q-transcription';
    td.textContent = q.t;
    area.appendChild(td);
  }

  var hd = document.createElement('div');
  hd.className = 'q-hint';
  hd.textContent = mode === 'en' ? 'Выберите перевод на русский' : 'Выберите перевод на английский';
  area.appendChild(hd);

  var pool = getPool();
  var wrong = shuffle(pool.filter(function(w) { return w.e !== q.e; })).slice(0, 3);
  var opts = shuffle([q].concat(wrong));
  var optDiv = document.createElement('div');
  optDiv.className = 'options';
  opts.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = mode === 'en' ? opt.r : opt.e;
    var correct = opt.e === q.e;
    btn.addEventListener('click', function() { checkAnswer(btn, correct, q); });
    optDiv.appendChild(btn);
  });
  area.appendChild(optDiv);
}
function checkAnswer(btn, isCorrect, q) {
  if (answered) return;
  answered = true; total++;
  document.querySelectorAll('.opt').forEach(function(b) {
    b.disabled = true;
    if (b.textContent === (mode === 'en' ? q.r : q.e)) b.classList.add('correct');
  });
  if (isCorrect) {
    score++;
    document.getElementById('expl').innerHTML = '✅ Верно! <strong>' + q.e + '</strong> ' + q.t + ' = ' + q.r;
  } else {
    btn.classList.add('wrong');
    document.getElementById('expl').innerHTML = '❌ Неверно. <strong>' + q.e + '</strong> ' + q.t + ' = ' + q.r;
  }
  document.getElementById('expl').classList.add('visible');
  document.getElementById('nextBtn').classList.add('visible');
  updateStats();
}
function nextQ() { qIdx++; renderQ(); }
function showResult() {
  document.getElementById('qArea').innerHTML = '';
  document.getElementById('expl').classList.remove('visible');
  document.getElementById('nextBtn').classList.remove('visible');
  document.getElementById('pFill').style.width = '100%';
  var pct = Math.round(score / questions.length * 100);
  document.getElementById('rScore').textContent = score + '/' + questions.length;
  document.getElementById('rMsg').textContent =
    pct >= 90 ? '🔥 Превосходно! Вы знаете эти слова!' :
    pct >= 70 ? '👍 Хороший результат! Повторите ошибки.' :
    pct >= 50 ? '💪 Неплохо! Стоит потренироваться ещё.' :
    '📚 Продолжайте учить — всё получится!';
  document.getElementById('result').classList.add('visible');
}
restart();
